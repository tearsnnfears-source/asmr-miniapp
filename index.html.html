<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ASMR.LEAKS — Landing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #FF7EC8;
  --lime: #CCFF00;
  --blue: #44C8FF;
  --purple: #C86BFF;
  --orange: #FF9F44;
  --dark: #0E0E0F;
  --dark2: #161617;
  --dark3: #1E1E20;
  --dark4: #252527;
  --text: #FFFFFF;
  --muted: rgba(255,255,255,0.45);
  --border: rgba(255,255,255,0.08);
  --success: #4ADE80;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  background: #111;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── PHONE MOCKUP ── */
.phone-frame {
  width: 390px;
  height: 844px;
  border-radius: 44px;
  border: 8px solid #1a1a1a;
  box-shadow: 0 0 0 1px #333, 0 40px 80px rgba(0,0,0,0.8);
  overflow: hidden;
  position: relative;
  background: var(--dark);
  display: flex;
  flex-direction: column;
}

.phone-notch {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 150px;
  height: 28px;
  background: #1a1a1a;
  border-radius: 0 0 20px 20px;
  z-index: 200;
}

.phone-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ���─ HEADER ── */
.header {
  background: var(--dark2);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 32px;
  flex-shrink: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  border: 2px solid rgba(255,126,200,0.3);
  flex-shrink: 0;
}

.user-info h3 {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 1px;
}

.user-info p {
  font-size: 10px;
  color: var(--pink);
}

.days-left {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(200,255,68,0.08);
  border: 1px solid rgba(200,255,68,0.2);
  border-radius: 50px;
  padding: 5px 12px;
}

.days-left-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  color: var(--lime);
  line-height: 1;
}

.days-left-label {
  font-size: 8px;
  color: rgba(200,255,68,0.6);
}

/* ── SCROLLABLE CONTENT ── */
.scroll-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
  padding-bottom: 10px;
}

.scroll-content::-webkit-scrollbar {
  display: none;
}

/* ── MAIN CONTENT ── */
.content {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── PREVIEW SECTION ── */
.preview-section {
  background: linear-gradient(145deg, #1a0812, #0e0e1a);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  text-align: center;
  overflow: hidden;
}

.preview-section h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 1.2px;
  margin-bottom: 12px;
  color: var(--text);
}

.preview-placeholder {
  width: 100%;
  aspect-ratio: 16/9;
  background: radial-gradient(circle at center, rgba(255,126,200,0.1) 0%, transparent 70%);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  color: rgba(255,255,255,0.1);
  margin-bottom: 10px;
}

.preview-text {
  font-size: 11px;
  color: var(--muted);
  font-weight: 300;
}

/* ── CTA BUTTONS ── */
.cta-section {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn {
  width: 100%;
  border: none;
  border-radius: 12px;
  padding: 14px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  line-height: 1;
}

.btn-primary {
  background: linear-gradient(135deg, #CCFF00, #B3E600);
  color: #0E0E0F;
  box-shadow: 0 4px 16px rgba(204,255,0,0.3);
}

.btn-primary:active {
  transform: scale(0.97);
  opacity: 0.9;
}

.btn-secondary {
  background: linear-gradient(135deg, var(--pink), #FF4A9E);
  color: #0E0E0F;
  box-shadow: 0 4px 16px rgba(255,126,200,0.3);
}

.btn-secondary:active {
  transform: scale(0.97);
  opacity: 0.9;
}

.btn-secondary:active {
  background: var(--dark4);
}

.btn-favorites {
  background: linear-gradient(135deg, var(--pink), #FF4A9E);
  color: #0E0E0F;
  box-shadow: 0 4px 16px rgba(255,126,200,0.3);
}

.btn-favorites:active {
  transform: scale(0.97);
  opacity: 0.9;
}

.btn.hidden {
  display: none;
}

/* ── SECTION HEADER ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--text);
}

.see-all-btn {
  background: none;
  border: none;
  font-size: 10px;
  color: var(--pink);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  transition: color 0.15s;
}

.see-all-btn:active {
  color: #FF4A9E;
}

/* ── ARTISTS SECTION ── */
.artists-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scrollbar-width: none;
  scroll-behavior: smooth;
}

.artists-scroll::-webkit-scrollbar {
  display: none;
}

.artist-mini-card {
  flex-shrink: 0;
  width: 70px;
  text-align: center;
  cursor: pointer;
}

.artist-mini-av {
  width: 70px;
  height: 94px;
  border-radius: 10px;
  background: var(--dark3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  color: rgba(255,255,255,0.1);
  margin-bottom: 6px;
  border: 1px solid var(--border);
  transition: border-color 0.2s;
  background-size: cover;
  background-position: center;
}

.artist-mini-card:active .artist-mini-av {
  border-color: rgba(255,126,200,0.4);
}

.artist-mini-name {
  font-size: 9px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── NEW VIDEOS SECTION ── */
.videos-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scrollbar-width: none;
  scroll-behavior: smooth;
}

.videos-scroll::-webkit-scrollbar {
  display: none;
}

.video-mini-card {
  flex-shrink: 0;
  width: 150px;
  cursor: pointer;
}

.video-mini-thumb {
  width: 150px;
  height: 84px;
  border-radius: 8px;
  background: var(--dark3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: rgba(255,255,255,0.07);
  margin-bottom: 6px;
  position: relative;
  border: 1px solid var(--border);
}

.video-dur {
  position: absolute;
  bottom: 4px;
  right: 4px;
  background: rgba(0,0,0,0.7);
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 3px;
  color: rgba(255,255,255,0.8);
}

.video-mini-title {
  font-size: 10px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.video-mini-artist {
  font-size: 9px;
  color: var(--pink);
}

/* ── ARTIST PAGE ── */
.page-container {
  display: none;
  flex-direction: column;
  position: relative;
  height: 100%;
}

.page-container.active {
  display: flex;
}

.artist-page-back {
  position: absolute;
  top: 32px;
  left: 16px;
  background: rgba(0,0,0,0.6);
  border: none;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
  z-index: 110;
  backdrop-filter: blur(4px);
}

.artist-page-back:active {
  background: rgba(0,0,0,0.8);
}

.artist-bg {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-size: cover;
  background-position: center;
  filter: blur(8px) brightness(0.6);
  z-index: 1;
}

.artist-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse at top-left, rgba(0,0,0,0.4) 0%, transparent 40%),
    radial-gradient(ellipse at top-right, rgba(0,0,0,0.4) 0%, transparent 40%),
    radial-gradient(ellipse at bottom-left, rgba(0,0,0,0.5) 0%, transparent 40%),
    radial-gradient(ellipse at bottom-right, rgba(0,0,0,0.5) 0%, transparent 40%),
    url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /></filter><rect width="400" height="300" filter="url(%23noise)" opacity="0.08"/></svg>');
  mix-blend-mode: multiply;
}
.artist-content {
  position: relative;
  z-index: 2;
  flex: 1;
}

.artist-stats-bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(22,22,23,0.9);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  gap: 0;
  z-index: 3;
}

.artist-stat {
  flex: 1;
  text-align: center;
}

.artist-stat:first-child {
  border-right: 1px solid var(--border);
  padding-right: 20px;
}

.artist-stat:last-child {
  padding-left: 20px;
}

.artist-stat-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  color: var(--lime);
  line-height: 1;
  margin-bottom: 6px;
}

.artist-stat-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

/* ── MODAL ── */
/* ── MODAL ── */
.modal {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: flex-end;
  z-index: 200;
  backdrop-filter: blur(4px);
  width: 390px;
  height: 844px;
  border-radius: 44px;
  overflow: hidden;
}

.modal.active {
  display: flex;
}

.modal-content {
  width: 100%;
  height: auto;
  max-height: 55vh;
  background: var(--dark2);
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 24px 16px 16px;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
  position: relative;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-close {
  position: absolute;
  top: -40px;
  right: 0;
  width: 32px;
  height: 32px;
  background: var(--dark3);
  border: none;
  border-radius: 50%;
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  z-index: 201;
}

.modal-close:active {
  background: var(--dark4);
}

.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 1px;
  margin-bottom: 16px;
  margin-top: 6px;
}

.modal-title span {
  color: var(--pink);
}

/* ── PRICING CARDS ── */
.pricing-cards {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

.price-card {
  background: var(--dark3);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.15s;
}

.price-card.selected {
  border-color: rgba(204,255,0,0.5);
  background: rgba(204,255,0,0.05);
}

.price-card:active {
  transform: scale(0.98);
}

.price-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.price-name {
  font-size: 12px;
  font-weight: 500;
}

.price-amount {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  color: var(--lime);
}

.price-per {
  font-size: 10px;
  color: var(--muted);
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(150px);
  background: var(--dark3);
  border: 1px solid rgba(204,255,0,0.3);
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 12px;
  color: var(--lime);
  z-index: 300;
  transition: all 0.3s;
  white-space: nowrap;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="phone-frame">
  <div class="phone-notch"></div>
  
  <div class="phone-content">
    <!-- HEADER -->
    <div class="header">
      <div class="header-left">
        <div class="avatar">SR</div>
        <div class="user-info">
          <h3>Sofia Reinholt</h3>
          <p>@sofiareinholt</p>
        </div>
      </div>
      <div class="days-left">
        <div class="days-left-num">27</div>
        <div class="days-left-label">days</div>
      </div>
    </div>

    <!-- HOME PAGE -->
    <div class="scroll-content" id="homePage">
      <div class="content">

        <!-- PREVIEW SECTION -->
        <div class="preview-section">
          <h2>Page Preview</h2>
          <div class="preview-placeholder">🎬</div>
          <p class="preview-text">Insert your group preview video here</p>
        </div>

        <!-- CTA BUTTONS -->
        <div class="cta-section" id="ctaSection">
          <button class="btn btn-primary" id="subscribeBtnMain" onclick="openSubscribeModal()">
            💳 Subscribe Now
          </button>
          <button class="btn btn-secondary" id="freeBtnMain" onclick="tryFree()">
            🎁 Try 3 Days Free
          </button>
          <button class="btn btn-favorites hidden" id="favoritesBtnMain">
            ⭐ My Favorites
          </button>
        </div>

        <!-- ARTISTS SECTION -->
        <div>
          <div class="section-header">
            <div class="section-title">🎙 Artists</div>
            <button class="see-all-btn" onclick="showToast('See all artists')">See all →</button>
          </div>
          <div class="artists-scroll" id="artistsScroll"></div>
        </div>

        <!-- NEW VIDEOS SECTION -->
        <div>
          <div class="section-header">
            <div class="section-title">✨ New Videos</div>
            <button class="see-all-btn" onclick="showToast('See all videos')">See all →</button>
          </div>
          <div class="videos-scroll" id="videosScroll"></div>
        </div>

      </div>
    </div>

    <!-- ARTIST PAGE -->
    <div class="page-container" id="artistPage">
  <button class="artist-page-back" onclick="goBack()">‹ Back</button>
  <div class="artist-bg" id="artistBg"></div>
  <div class="artist-content">
    <!-- Пустое пространство сверху -->
  </div>
  <!-- БАР ВНИЗУ -->
  <div class="artist-stats-bottom">
    <div class="artist-stat">
      <div class="artist-stat-val" id="photoCount">12</div>
      <div class="artist-stat-label">Photos</div>
    </div>
    <div class="artist-stat">
      <div class="artist-stat-val" id="videoCount">8</div>
      <div class="artist-stat-label">Videos</div>
    </div>
  </div>
</div>

<!-- SUBSCRIBE MODAL -->
<div class="modal" id="subscribeModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title">Choose <span>Plan</span></div>
    <div class="pricing-cards" id="pricingCards"></div>
    <button class="btn btn-primary" onclick="confirmSubscribe()">
      💳 Subscribe
    </button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const artistsData = [
  { name: 'Moona ASMR', initials: 'MA', emoji: '🎙', photos: 12, videos: 8 },
  { name: 'HoneyGirl', initials: 'HG', emoji: '👧', photos: 15, videos: 10 },
  { name: 'Rose ASMR', initials: 'RA', emoji: '🌹', photos: 18, videos: 11 },
  { name: 'Mood ASMR', initials: 'MO', emoji: '😴', photos: 10, videos: 7 },
  { name: 'Puffin ASMR', initials: 'PA', emoji: '🐦', photos: 14, videos: 9 },
  { name: 'Trinki ASMR', initials: 'TA', emoji: '✨', photos: 16, videos: 12 },
];

const videos = [
  { title: 'Ear Eating ASMR', artist: 'Moona ASMR', duration: '41:07', emoji: '👂' },
  { title: 'Deep Whisper', artist: 'HoneyGirl', duration: '28:22', emoji: '🎤' },
  { title: 'Tapping Tingles', artist: 'Rose ASMR', duration: '55:14', emoji: '✋' },
  { title: 'Sleep Session', artist: 'Mood ASMR', duration: '34:18', emoji: '😴' },
  { title: 'Personal Attention', artist: 'Puffin ASMR', duration: '22:44', emoji: '💆' },
  { title: 'Binaural ASMR', artist: 'Trinki ASMR', duration: '48:07', emoji: '👂' },
];

const gradients = [
  '#FF7EC8', '#C8FF44', '#44C8FF', '#FF9F44',
  '#C86BFF', '#44FFB3'
];

const artistPhoto = 'https://images.unsplash.com/photo-1544717278-ca5e3cff53d7?w=500&h=600&fit=crop';

// ── STATE ──
let selectedPlan = 1;
let isSubscribed = false;

const plans = [
  { name: '1 Week', price: '€5', per: '€0.71/day', days: 7 },
  { name: '1 Month', price: '€15', per: '€0.50/day', days: 30 },
  { name: '3 Months', price: '€35', per: '€0.39/day', days: 90 },
];

// ── INIT ──
function init() {
  renderArtists();
  renderVideos();
  renderPricingCards();
}

// ── ARTISTS ──
function renderArtists() {
  const scroll = document.getElementById('artistsScroll');
  scroll.innerHTML = artistsData.map((artist) => {
    return `
      <div class="artist-mini-card" onclick="openArtistPage('${artist.name}', ${artist.photos}, ${artist.videos})">
        <div class="artist-mini-av" style="background-image:url('${artistPhoto}');"></div>
        <div class="artist-mini-name">${artist.name.split(' ')[0]}</div>
      </div>
    `;
  }).join('');
}

// ── VIDEOS ──
function renderVideos() {
  const scroll = document.getElementById('videosScroll');
  scroll.innerHTML = videos.map((video) => `
    <div class="video-mini-card">
      <div class="video-mini-thumb">
        ${video.emoji}
        <div class="video-dur">${video.duration}</div>
      </div>
      <div class="video-mini-title">${video.title}</div>
      <div class="video-mini-artist">${video.artist}</div>
    </div>
  `).join('');
}

// ── ARTIST PAGE ──
function openArtistPage(name, photos, videos_count) {
  document.getElementById('homePage').style.display = 'none';
  document.getElementById('artistPage').classList.add('active');
  
  // Замени на URL твоей фотки
  const mooonaPhotoUrl = 'https://i.ibb.co/7xjYTFQn/photo-2026-01-14-07-10-54.jpg';
  
  document.getElementById('artistBg').style.backgroundImage = `url('${mooonaPhotoUrl}')`;
  document.getElementById('photoCount').textContent = photos;
  document.getElementById('videoCount').textContent = videos_count;
}

function goBack() {
  document.getElementById('artistPage').classList.remove('active');
  document.getElementById('homePage').style.display = 'block';
}

// ── PRICING ──
function renderPricingCards() {
  const container = document.getElementById('pricingCards');
  container.innerHTML = plans.map((plan, i) => `
    <div class="price-card ${i === selectedPlan ? 'selected' : ''}" onclick="selectPlan(${i})">
      <div class="price-top">
        <div class="price-name">${plan.name}</div>
        <div class="price-amount">${plan.price}</div>
      </div>
      <div class="price-per">${plan.per}</div>
    </div>
  `).join('');
}

function selectPlan(index) {
  selectedPlan = index;
  renderPricingCards();
}

// ── SUBSCRIBE ──
function openSubscribeModal() {
  document.getElementById('subscribeModal').classList.add('active');
}

function closeModal() {
  document.getElementById('subscribeModal').classList.remove('active');
}

function confirmSubscribe() {
  isSubscribed = true;
  closeModal();
  updateUI();
  showToast('✅ Welcome to ASMR.LEAKS!');
}

function tryFree() {
  isSubscribed = true;
  updateUI();
  showToast('🎁 3 free days activated!');
}

function updateUI() {
  const freeBtnMain = document.getElementById('freeBtnMain');
  const favoritesBtnMain = document.getElementById('favoritesBtnMain');

  // Скрываем только кнопку Free Trial
  freeBtnMain.classList.add('hidden');

  // Показываем кнопку Favorites
  favoritesBtnMain.classList.remove('hidden');
}

// ── TOAST ──
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── START ──
init();
</script>
